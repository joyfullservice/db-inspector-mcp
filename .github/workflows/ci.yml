name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

jobs:
  test-and-package:
    name: Test and package checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Sync from lockfile
        run: uv sync --frozen --extra dev

      - name: Run tests (skip integration)
        run: uv run pytest tests -v -m "not integration"

      - name: Build package
        run: uv build

      - name: Validate package metadata
        run: uv run twine check dist/*

  security-audit:
    name: Dependency security audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Sync from lockfile
        run: uv sync --frozen --extra dev

      - name: Audit locked dependencies
        run: uv audit --preview-features audit-command
